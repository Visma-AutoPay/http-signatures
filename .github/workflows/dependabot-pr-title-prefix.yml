name: 'Dependabot PR'
on:
  pull_request:
    types: [opened]

jobs:
  title-prefix:
    if: github.actor == 'dependabot[bot]' && !startsWith(github.event.pull_request.title, 'AUTOPAY-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add AUTOPAY-00001 prefix to PR title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --title "AUTOPAY-00001 $PR_TITLE"
